<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Variety Price Chart</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    main { max-width: 900px; margin: 0 auto; padding: 2rem 1rem 4rem; }
    .breadcrumb { font-size: .85rem; margin-bottom: .75rem; opacity:.75; }
    .breadcrumb a { text-decoration:none; color: #b5482c; }
    .variety-header { display:flex; align-items:baseline; gap:1rem; flex-wrap:wrap; }
    .variety-header h1 { font-size:1.9rem; margin:0; }
    .pill { background:#ffe6dc; color:#b5482c; padding:.35rem .7rem; border-radius:1rem; font-size:.75rem; letter-spacing:.5px; }
    #chartWrap { background:#fff; border:1px solid #eee; border-radius:12px; padding:1rem 1.25rem 1.5rem; box-shadow:0 2px 4px rgba(0,0,0,.05); }
    #meta { margin-top:1rem; font-size:.8rem; display:flex; gap:1.25rem; flex-wrap:wrap; }
    .metric { background:#fafafa; padding:.6rem .9rem; border-radius:8px; border:1px solid #eee; }
    .metric strong { display:block; font-size:.65rem; letter-spacing:1px; font-weight:600; opacity:.65; text-transform:uppercase; }
    .metric span { font-size:1rem; font-weight:500; }
    .empty { text-align:center; padding:2.5rem 1rem; color:#777; }
    .loading-spinner { width:24px; height:24px; border:3px solid #eee; border-top-color:#b5482c; border-radius:50%; animation:spin 1s linear infinite; margin:1.5rem auto; }
    @keyframes spin { to { transform:rotate(360deg); } }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js" defer></script>
  <script defer>
    function qs(name){ const p=new URLSearchParams(location.search); return p.get(name)||''; }
    const mandi = qs('mandi');
    const variety = qs('variety');
    document.addEventListener('DOMContentLoaded', () => {
      document.getElementById('varietyName').textContent = variety || 'Variety';
      document.getElementById('mandiName').textContent = mandi;
      if(!mandi || !variety){
        document.getElementById('chartWrap').innerHTML = '<div class="empty">Missing parameters.</div>';
        return;
      }
      loadData();
    });

    async function loadData(){
      const wrap = document.getElementById('chartInner');
      wrap.innerHTML = '<div class="loading-spinner"></div>';
      try {
        const res = await fetch(`/api/prices/${mandi}?fresh=1`);
        const data = await res.json();
        const row = (data.rows||[]).find(r => r.variety.toLowerCase() === variety.toLowerCase()) || (data.rows||[]).find(r => variety.toLowerCase().includes(r.variety.toLowerCase()));
        if(!row){
          wrap.innerHTML = '<div class="empty">No price data found for this variety right now.</div>';
          return;
        }
        const current = row.pricePerBox;
        // Build synthetic 10-day history (placeholder until real history is implemented)
        const days = 10;
        let seed = current;
        const history = [];
        for(let i=days-1;i>=0;i--){
          if(i === days-1){ seed = current; }
          else { seed = Math.round(seed * (1 + (Math.random() - 0.5) * 0.06)); }
          history.push({ day: i, value: seed });
        }
        const labels = history.map(h => `${h.day === 0 ? 'Today' : h.day+'d'}`);
        const values = history.map(h => h.value);
        wrap.innerHTML = '<canvas id="priceChart" height="140"></canvas>';
        const ctx = document.getElementById('priceChart');
        new Chart(ctx, {
          type:'line',
          data:{ labels, datasets:[{ label: 'Box Price (₹)', data: values, tension:.35, borderColor:'#b5482c', backgroundColor:'rgba(181,72,44,.08)', fill:true, pointRadius:3, pointHoverRadius:5 }] },
          options:{
            responsive:true,
            interaction:{ mode:'index', intersect:false },
            plugins:{ legend:{ display:false }, tooltip:{ callbacks:{ label:ctx => '₹'+ctx.parsed.y } } },
            scales:{ y:{ ticks:{ callback:v=>'₹'+v }, beginAtZero:false, grid:{ color:'rgba(0,0,0,.05)' } }, x:{ grid:{ display:false } } }
          }
        });
        document.getElementById('currentPrice').textContent = '₹'+current;
        const change = values[values.length-1] - values[values.length-2];
        document.getElementById('dayChange').textContent = (change>=0?'+':'')+change;
        document.getElementById('dataStamp').textContent = new Date(data.updated||Date.now()).toLocaleString();
      } catch(e){
        wrap.innerHTML = '<div class="empty">Failed to load data.</div>';
        console.warn(e);
      }
    }
  </script>
</head>
<body>
  <header class="site-header" style="position:sticky;top:0;background:#fff;z-index:10;padding:.75rem 1.25rem;border-bottom:1px solid #eee;display:flex;align-items:center;gap:.75rem;">
    <a href="index.html" style="text-decoration:none;font-weight:600;color:#b5482c;">← Back</a>
    <div style="font-size:.9rem;opacity:.7;">Kashmir Apple Prices</div>
  </header>
  <main>
    <div class="breadcrumb"><a href="index.html">Home</a> / <span id="mandiName"></span> / <span id="varietyName"></span></div>
    <div class="variety-header">
      <h1 id="varietyName">Variety</h1>
      <span class="pill" id="mandiTag"></span>
    </div>
    <p style="margin-top:.25rem;font-size:.9rem;color:#555;">Synthetic historical trend (placeholder). Actual historical tracking not yet implemented.</p>
    <section id="chartWrap">
      <div id="chartInner"></div>
      <div id="meta">
        <div class="metric"><strong>Current</strong><span id="currentPrice">—</span></div>
        <div class="metric"><strong>Day Δ</strong><span id="dayChange">—</span></div>
        <div class="metric"><strong>Updated</strong><span id="dataStamp">—</span></div>
      </div>
    </section>
  </main>
</body>
</html>
